<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Nouveautés, versions et notes de développement de La baraque à jeux."
    />
    <meta name="theme-color" content="#071b31" />
    <meta property="og:title" content="Blog - La baraque à jeux" />
    <meta property="og:type" content="website" />
    <meta
      property="og:description"
      content="Les nouveautés du portail et des mini-jeux lillois."
    />
    <meta property="og:image" content="assets/brand/og-image.png" />
    <title>Blog - La baraque à jeux</title>
    <link rel="icon" type="image/png" href="assets/brand/favicon-48.png" />
    <link
      rel="apple-touch-icon"
      href="assets/brand/favicon-180.png"
    />
    <link
      rel="preload"
      href="assets/fonts/inter-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="packages/ui/tokens.css" />
    <link rel="stylesheet" href="packages/ui/base.css" />
    <link rel="stylesheet" href="packages/ui/site-nav.css" />
    <link rel="stylesheet" href="packages/ui/components.css" />
  </head>
  <body class="labaj-site">
    <header class="labaj-header">
      <nav class="labaj-nav" aria-label="Menu principal">
        <a class="labaj-brand" href="./" aria-label="La baraque à jeux, accueil">
          <picture class="labaj-brand__logo">
            <source
              srcset="assets/brand/la-baraque-a-jeux-lille.webp"
              type="image/webp"
            />
            <img
              src="assets/brand/la-baraque-a-jeux-lille-logo.png"
              alt=""
              width="48"
              height="48"
            />
          </picture>
          <span class="labaj-brand__text">
            <strong>La baraque à jeux</strong>
            <span>Lille</span>
          </span>
        </a>

        <div class="labaj-links">
          <a class="labaj-link labaj-link--home" href="./">Accueil</a>
          <a class="labaj-link" href="blog.html" aria-current="page">Blog</a>
          <button class="labaj-link" type="button" data-about-trigger>À propos</button>
        </div>
      </nav>
    </header>

    <main class="page-shell blog-shell">
      <article class="blog-content" id="blogContent" aria-live="polite">
        <p>Chargement des nouveautés...</p>
      </article>
    </main>

    <footer class="site-footer">
      <p>La baraque à jeux par Dr. John</p>
    </footer>

    <script type="module" src="packages/ui/about-dialog.js"></script>
    <script type="module" src="packages/ui/register-sw.js"></script>
    <script type="module">
      import { renderMarkdown } from "./packages/game-utils/markdown.js";

      const blogContent = document.getElementById("blogContent");

      fetch("docs/blog/NEWS.md")
        .then((response) => {
          if (!response.ok) throw new Error("Fichier introuvable");
          return response.text();
        })
        .then((markdown) => {
          blogContent.innerHTML = renderMarkdown(markdown);
        })
        .catch(() => {
          blogContent.innerHTML =
            "<h1>Blog</h1><p>Les nouveautés sont momentanément indisponibles.</p>";
        });

    </script>
  </body>
</html>
